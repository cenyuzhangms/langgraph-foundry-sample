# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: langgraph-foundry-sample
description: |
  LangGraph multi-agent supervisor (research_expert + math_expert + code_expert)
  hosted on Foundry. Demonstrates that an existing langgraph-supervisor app
  can be put on Foundry hosted agents with a small BaseAgent adapter.
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  - name: PROJECT_ENDPOINT
    value: ${AZURE_AI_PROJECT_ENDPOINT}
  - name: AZURE_OPENAI_ENDPOINT
    value: ${AZURE_OPENAI_ENDPOINT}
  - name: MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: AZURE_OPENAI_API_VERSION
    value: "2024-10-21"
